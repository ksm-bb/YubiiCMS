<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link rel="apple-touch-icon" href="https://i.ibb.co/ZR56LZNJ/2-20260208220724.png">
  <link rel="icon" sizes="192x192" href="https://i.ibb.co/ZR56LZNJ/2-20260208220724.png">
  <link rel="shortcut icon" href="https://i.ibb.co/ZR56LZNJ/2-20260208220724.png">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    // ==========================================
    // 🖼️ COMPONENTS: ไอคอน SVG ทั้งหมดของเว็บ
    // ==========================================
    const IconPlus = ({size=24, strokeWidth="3", className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconHome = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconSearch = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconClock = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconFileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconLoader = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconEye = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconEyeOff = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
    const IconImage = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconList = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconChevronLeft = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconWallet = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg>;

    // ==========================================
    // 🎨 ตัวแปรสีหลัก
    // ==========================================
    const COLORS = {
      blue: '#DBD8E7',
      pink: '#F2DCE9',
      purple: '#DDCADB',
      orange: '#FAF1DB',
      bg: '#DBDBE7',
      white: '#DBD8E7',
      textMain: '#978489',
      textSoft: '#978489',
      pinkDeep: '#978489',
      blueDeep: '#978489',
      purpleDeep: '#978489',
      orangeDeep: '#978489',
      cardBg: '#f7e6f0',
      cardBgDone: '#DBD8E7',
      cardWhite: '#F2DCE9',
      cardBorder: '#DDCADB',
      cardInner: '#fff8ea',
      cloudWhite: '#F2DCE9',
      modalBg: '#f7e6f0',
      navBarBg: '#F2DCE9',
      profileBorder: '#978489',
      buttonBg: '#DDCADB',
      dividerColor: '#978489',
      emptyStateBg: '#DBD8E7',
      calendarBg: '#fff8ea',
      searchInputBg: '#fff8ea',
      filterBarBg: '#DBD8E7',
      bannerOverlayBg: '#DBD8E7',
    };

    // ==========================================
    // ☁️ COMPONENT: FluffyCloud
    // ==========================================
    const FluffyCloud = React.memo(({ top, left, right, bottom, scale = 1, opacity = 0.7, delay = '0s', reverse = false }) => (
      <div className="absolute pointer-events-none drop-shadow-sm z-0" style={{ top, left, right, bottom, opacity, transform: `scale(${scale})` }}>
        <div className={reverse ? 'animate-float-reverse' : 'animate-float'} style={{ animationDelay: delay }}>
          <div className="relative w-40 h-16">
            <div className="absolute bottom-0 left-4 w-32 h-10 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-2 left-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-5 left-10 w-16 h-16 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-1 right-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
          </div>
        </div>
      </div>
    ));

    // ==========================================
    // 🌅 COMPONENT: DynamicBackground
    // ==========================================
    const DynamicBackground = React.memo(() => (
      <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div className="absolute top-[10%] left-[-10%] w-72 h-72 rounded-full blur-[90px] opacity-60 animate-float" style={{ backgroundColor: COLORS.pink }}></div>
        <div className="absolute bottom-[10%] right-[-10%] w-80 h-80 rounded-full blur-[100px] opacity-50 animate-float-reverse" style={{ backgroundColor: COLORS.blue }}></div>
        <div className="absolute top-[40%] right-[10%] w-48 h-48 rounded-full blur-[80px] opacity-40 animate-float" style={{ backgroundColor: COLORS.purple }}></div>
        <FluffyCloud top="8%" left="-5%" scale={1.5} opacity={0.6} delay="0s" />
        <FluffyCloud top="35%" left="-15%" scale={2.5} opacity={0.3} delay="2.5s" />
        <FluffyCloud bottom="20%" left="5%" scale={1.6} opacity={0.6} delay="3s" />
        <FluffyCloud top="50%" right="-5%" scale={1.8} opacity={0.5} delay="1s" reverse={true} />
      </div>
    ));

    // ==========================================
    // 🔝 COMPONENT: Header
    // ==========================================
    const Header = React.memo(({ isAdmin, setIsAdmin, setShowAuthModal, handleImageUpload, profileImage, view, setView }) => (
      <div className="px-5 pt-6 pb-2 relative z-10">
        <div className="backdrop-blur-md rounded-[32px] p-4 shadow-xl shadow-[#978489]/15 flex items-center justify-between h-20 relative overflow-hidden group" style={{ backgroundColor: `${COLORS.cardWhite}66`, borderWidth: '1px', borderColor: `${COLORS.cardBorder}80` }}>
          <div className="absolute left-6 top-1/2 -translate-y-1/2 w-24 h-8 bg-[#DBD8E7]/40 blur-xl rounded-full"></div>
          <div className="flex flex-col justify-center ml-2 relative z-10">
            <div className="flex items-center gap-1">
              <h1 className="text-2xl font-black italic tracking-tighter flex">
                {" Commission".split('').map((char, index) => (
                  <span 
                    key={index} 
                    className={`bg-gradient-to-br from-[#978489] to-[#978489] bg-clip-text text-transparent drop-shadow-sm inline-block animate-text-wave pb-2 ${char === ' ' ? 'w-2.5' : 'pr-[1.5px]'}`} 
                    style={{ animationDelay: `${index * 0.1}s` }}
                  >
                    {char}
                  </span>
                ))}
              </h1>
              <button 
                onClick={() => {
                  if (isAdmin) {
                    setIsAdmin(false);
                    if (view === 'revenue') setView('dashboard');
                  } else {
                    setShowAuthModal(true);
                  }
                }} 
                className={`px-1.5 py-0.5 ml-1 rounded-full text-[7px] font-black uppercase tracking-widest border shadow-sm transition-all active:scale-95`} 
                style={{ backgroundColor: isAdmin ? `${COLORS.buttonBg}99` : `${COLORS.buttonBg}cc`, color: isAdmin ? '#978489' : '#978489', borderColor: isAdmin ? '#DDCADB' : '#DBD8E7' }}
              >
                {isAdmin ? 'Admin' : 'Guest'}
              </button>
            </div>
            <div className="flex items-center gap-1.5 opacity-70">
              <div className="w-3 h-[1px]" style={{ backgroundColor: COLORS.pinkDeep }}></div>
              <p className="text-[8px] font-black tracking-[0.5em] uppercase" style={{ color: COLORS.purpleDeep }}>Queue & Status</p>
            </div>
          </div>
          <div onClick={isAdmin ? handleImageUpload : undefined} className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center relative overflow-hidden transition-transform ${isAdmin ? 'cursor-pointer hover:scale-105 active:scale-95' : ''}`} style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: COLORS.profileBorder }}>
            {profileImage ? (
              <img src={profileImage} alt="Profile" className="w-full h-full object-cover" />
            ) : (
              <>
                <div className="absolute inset-0 opacity-40" style={{ background: `linear-gradient(to top right, ${COLORS.pink}, ${COLORS.blue})` }}></div>
                <span className="text-2xl relative z-10 select-none">🐰</span>
              </>
            )}
          </div>
        </div>
      </div>
    ));

    // ==========================================
    // 🌸 COMPONENT: ProgressFlower
    // ==========================================
    const ProgressFlower = React.memo(({ progress, todayTasksLength, doneToday, triggerFlowerBounce, isBouncing }) => {
      const bloomScale = Math.max(0.2, progress / 100);
      const isFullBloom = progress === 100 && todayTasksLength > 0;
      const petals = [0, 72, 144, 216, 288].map(angle => {
        const rad = (angle * Math.PI) / 180;
        return { cx: 50 + 15 * Math.sin(rad), cy: 50 - 15 * Math.cos(rad), r: 18 };
      });

      return (
        <div onClick={triggerFlowerBounce} className={`backdrop-blur-sm rounded-[28px] p-3 flex flex-col items-center justify-center shadow-lg shadow-[#978489]/15 h-full relative overflow-hidden transition-all duration-300 cursor-pointer ${isBouncing ? 'scale-95' : 'hover:scale-[1.02]'}`} style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
          <div className="absolute top-2 left-3 text-[8px] font-black uppercase tracking-tighter opacity-70" style={{ color: COLORS.purpleDeep }}>ความสำเร็จวันนี้</div>
          <div className="relative w-full h-20 flex items-center justify-center mt-2">
            {progress > 0 && (
              <div className="absolute inset-0 pointer-events-none">
                  <div className="absolute top-1/2 left-1/4 w-1.5 h-1.5 rounded-full animate-float-particle-1 opacity-60" style={{ backgroundColor: COLORS.pinkDeep }}></div>
                  <div className="absolute top-2/3 right-1/4 w-2 h-2 rounded-full animate-float-particle-2 opacity-60" style={{ backgroundColor: COLORS.blueDeep }}></div>
                  <div className="absolute top-1/3 right-1/3 w-1.5 h-1.5 rounded-full animate-float-particle-3 opacity-60" style={{ backgroundColor: COLORS.buttonBg }}></div>
              </div>
            )}
            <svg viewBox="0 0 100 100" className="w-20 h-20 overflow-visible">
              <g transform="translate(50, 50)">
                  <g className="animate-breathe">
                    <g transform={`scale(${bloomScale})`} className="transition-transform duration-1000 cubic-bezier(0.34, 1.56, 0.64, 1)">
                      <g transform="translate(-50, -50)">
                        {petals.map((p, i) => (
                          <circle key={i} cx={p.cx} cy={p.cy} r={p.r} fill="#DBDBE7" opacity="0.95" className="transition-all duration-700"/>
                        ))}
                        <circle cx="50" cy="50" r="14" fill="#FAF1DB" className="transition-all duration-700" />
                        {isFullBloom && (
                          <g transform="translate(50, 50)" className="animate-fade-in">
                            <path d="M -5 -1 Q -3 -3 -1 -1" fill="none" stroke="#978489" strokeWidth="1.2" strokeLinecap="round" />
                            <path d="M 1 -1 Q 3 -3 5 -1" fill="none" stroke="#978489" strokeWidth="1.2" strokeLinecap="round" />
                            <path d="M -1.5 2 Q 0 4 1.5 2" fill="none" stroke="#978489" strokeWidth="1.2" strokeLinecap="round" />
                            <ellipse cx="-6" cy="1" rx="1.5" ry="1" fill="#DDCADB" opacity="0.8"/>
                            <ellipse cx="6" cy="1" rx="1.5" ry="1" fill="#DDCADB" opacity="0.8"/>
                          </g>
                        )}
                      </g>
                    </g>
                  </g>
              </g>
            </svg>
          </div>
          <div className="mt-1 flex items-center gap-1 px-2 py-0.5 rounded-full z-10" style={{ backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
            <span className="text-xs font-black" style={{ color: COLORS.purpleDeep }}>{progress}%</span>
            <div className="w-1 h-1 rounded-full" style={{ backgroundColor: COLORS.buttonBg }}></div>
            <span className="text-[8px] font-bold uppercase whitespace-nowrap" style={{ color: `${COLORS.textSoft}99` }}>{doneToday} / {todayTasksLength} งาน</span>
          </div>
        </div>
      );
    });

    // ==========================================
    // 📊 COMPONENT: CompactStats
    // ==========================================
    const CompactStats = React.memo(({ isAdmin, selectedNextDate, nextQueueDate, handleSetManualDate, waitingCount }) => (
      <div className="backdrop-blur-sm rounded-[28px] p-1 shadow-lg shadow-[#978489]/15 h-full flex overflow-hidden relative group transition-all" style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
          <div className={`flex-1 flex flex-col justify-center items-center p-2 relative rounded-l-[24px] transition-colors overflow-hidden ${isAdmin ? 'cursor-pointer' : ''}`} style={{ backgroundColor: `${COLORS.orange}66` }}>
            {isAdmin && (
              <input type="date" className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" value={selectedNextDate || nextQueueDate} onChange={(e) => handleSetManualDate(e.target.value)} />
            )}
            <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-md text-[7px] font-black shadow-sm uppercase tracking-wider whitespace-nowrap" style={{ color: COLORS.orangeDeep, backgroundColor: COLORS.buttonBg, borderWidth: '1px', borderColor: COLORS.cardBorder }}>NEXT QUEUE</div>
            
            <div className="flex flex-col items-center mt-1 relative z-0 pointer-events-none">
              <span className="text-3xl font-black leading-none tracking-tighter" style={{ color: COLORS.textMain }}>{new Date(nextQueueDate).getDate()}</span>
              <span className="text-[8px] font-black opacity-80 uppercase mt-0.5 whitespace-nowrap" style={{ color: COLORS.orangeDeep }}>{new Date(nextQueueDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</span>
            </div>

            {isAdmin && selectedNextDate && (
              <button 
                onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleSetManualDate(''); }} 
                className="absolute bottom-1.5 left-1/2 -translate-x-1/2 z-20 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm active:scale-90 transition-all whitespace-nowrap"
                style={{ color: COLORS.pinkDeep, backgroundColor: COLORS.buttonBg, borderWidth: '1px', borderColor: COLORS.cardBorder }}
                title="กลับไปคำนวณวันว่างอัตโนมัติ"
              >
                AUTO
              </button>
            )}
          </div>

          <div className="my-4 rounded-full" style={{ width: '1px', backgroundColor: `${COLORS.dividerColor}99` }}></div>
          
          <div className="flex-1 flex flex-col justify-center items-center p-2 relative">
            <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm uppercase tracking-wider whitespace-nowrap z-10" style={{ color: COLORS.blueDeep, backgroundColor: COLORS.buttonBg, borderWidth: '1px', borderColor: COLORS.cardBorder }}>จำนวนคิวก่อนหน้า</div>
            
            <div className="relative mt-5 flex flex-col items-center">
               <div className="relative">
                 <div className="absolute inset-0 blur-lg rounded-full opacity-40 scale-125" style={{ backgroundColor: COLORS.blue }}></div>
                 <div className="w-11 h-11 rounded-full flex flex-col items-center justify-center shadow-[inset_0_2px_8px_rgba(0,0,0,0.02)] relative z-10" style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: COLORS.blue }}>
                    <span className="text-xl font-black leading-none" style={{ color: COLORS.blueDeep }}>{waitingCount}</span>
                 </div>
               </div>
               <span className="text-[8px] font-black opacity-60 uppercase mt-1.5 relative z-10 whitespace-nowrap" style={{ color: COLORS.blueDeep }}>คิว</span>
            </div>
          </div>
      </div>
    ));

    // ==========================================
    // 🃏 COMPONENT: TaskCard
    // ==========================================
    const STATUS_ICONS = {
      'Sketch': 'https://i.ibb.co/gYg9Qnp/cdhw.gif', 
      'Base color': 'https://i.ibb.co/RGCYBH5L/1.gif',
      'Rendering': 'https://i.ibb.co/Rkn52G8y/5.gif',
      'Reviewing': 'https://i.ibb.co/84MYyZ63/2.gif',
      'Revising': 'https://i.ibb.co/27970QpT/3.gif'
    };

    const TaskCard = React.memo(({ task, isAdmin, onEdit, onToggleDoing, onToggleStatus, onChangeWorkStatus }) => {
      const usageType = task.usageType || 'non comm';
      const total = parseFloat(task.totalAmount) || 0;
      const paid = parseFloat(task.paidAmount) || 0;
      const percent = total > 0 ? Math.min(100, Math.round((paid / total) * 100)) : 0;
      
      const circleColor = usageType === 'comm use' ? '#978489' : '#B896A4'; 
      const radius = 30; 
      const circumference = 2 * Math.PI * radius;
      const strokeDashoffset = circumference - (percent / 100) * circumference;
      
      // เช็คว่าคิวนี้มี Tip ไหม
      const hasTip = task.hasTip === true || task.hasTip === 'true' || parseFloat(task.tipAmount) > 0;

      return (
        <div className="flex items-center gap-2 mb-2 relative">
          <div onClick={() => isAdmin && onEdit(task)} className={`relative flex-1 rounded-[22px] p-2 flex items-center gap-2 transition-all shadow-sm group backdrop-blur-sm ${isAdmin ? 'active:scale-[0.97] cursor-pointer' : ''}`} 
            style={{ 
              backgroundColor: task.status === 'done' ? COLORS.cardBgDone : task.status === 'doing' ? COLORS.cardBg : COLORS.cardBg,
              borderWidth: '1px',
              borderStyle: 'solid',
              borderColor: task.status === 'doing' ? COLORS.orangeDeep : (task.status === 'done' ? 'transparent' : COLORS.white), 
              opacity: task.status === 'done' ? 0.7 : 1 
            }}
            >
            
            {STATUS_ICONS[task.workStatus] && task.workStatus !== 'Waitlist' && task.workStatus !== 'Complete' && (
               <div className="absolute -top-4 -left-4 z-[60] pointer-events-none animate-float-icon">
                   <img src={STATUS_ICONS[task.workStatus]} alt={task.workStatus} className="w-11 h-11 object-contain drop-shadow-md" />
               </div>
            )}

            {task.status === 'doing' && (
               <div className="absolute inset-0 pointer-events-none z-[5]">
                 <div className="absolute -bottom-3 -right-4 animate-float-particle-2 drop-shadow-sm" style={{ animationDelay: '0.5s' }}>
                    <img src="https://i.ibb.co/0jDTND8c/image.png" className="w-10 h-10 object-contain" alt="particle" />
                 </div>
               </div>
            )}
            <div className="absolute left-2 top-3 bottom-3 w-1 rounded-full shadow-sm z-10" style={{ backgroundColor: task.channel === 'LINE' ? '#F2DCE9' : task.channel === 'FB' || task.channel === 'FACEBOOK' ? '#DBD8E7' : task.channel === 'IG' ? '#DDCADB' : COLORS.purpleDeep }}></div>
            
            <div className="flex-1 pl-7 pr-1 relative z-10 min-w-0 flex flex-col justify-center py-1">
              <div className="flex justify-between items-start mb-1">
                <div className="flex items-center gap-1.5 min-w-0">
                  <span className="font-bold text-[14px] truncate text-[#978489]">{task.client}</span>
                  <span className={`text-[7px] px-1.5 py-0.5 rounded-md font-black uppercase border whitespace-nowrap flex-shrink-0 ${
                    task.channel === 'LINE' ? 'text-[#978489] bg-[#F2DCE9]/50 border-[#F2DCE9]' : 
                    task.channel === 'FB' || task.channel === 'FACEBOOK' ? 'text-[#978489] bg-[#DBD8E7]/50 border-[#DBD8E7]' : 
                    task.channel === 'IG' ? 'text-[#978489] bg-[#DDCADB]/50 border-[#DDCADB]' : 
                    task.channel === 'DISCORD' || task.channel === 'Discord' ? 'text-[#978489] bg-[#FAF1DB]/50 border-[#FAF1DB]' : 
                    'bg-[#F2DCE9]/50 text-[#978489]/60 border-[#DBD8E7]'
                  }`}>{task.channel}</span>
                  {task.priority === 'urgent' && <span className="text-[8px] font-bold animate-pulse px-2 py-0.5 rounded-full shadow-sm text-[#978489] whitespace-nowrap flex-shrink-0" style={{ backgroundColor: COLORS.buttonBg }}>{'\u{1F525}'} ด่วน</span>}
                </div>
                <div className="flex items-center gap-1 text-[8px] font-black px-2 py-0.5 rounded-lg border shadow-sm text-[#978489] whitespace-nowrap flex-shrink-0 ml-1" style={{ backgroundColor: `${COLORS.buttonBg}cc`, borderColor: COLORS.cardBorder }}>
                    <IconCalendar size={10} className="text-[#978489]" />
                    {new Date(task.deadline).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' })}
                </div>
              </div>
              
              <div className="flex justify-between items-end mt-1">
                <div className="flex-1 min-w-0 mr-2 flex flex-col">
                  <span className={`text-[10px] font-bold truncate ${task.status === 'done' ? 'line-through text-[#978489]/40' : 'text-[#978489]/60'}`}>{task.type}</span>
                  {task.details && (
                    <span className={`text-[11px] font-medium truncate mt-0.5 ${task.status === 'done' ? 'text-[#978489]/40' : 'text-[#978489]/80'}`}>{task.details}</span>
                  )}
                </div>

                {isAdmin ? (
                  <div className="flex gap-1 flex-shrink-0 items-center">
                    <select
                      value={task.workStatus || 'Waitlist'}
                      onClick={(e) => e.stopPropagation()}
                      onChange={(e) => { e.stopPropagation(); onChangeWorkStatus(e, task, e.target.value); }}
                      className="text-[9px] font-bold text-[#978489] bg-white border rounded-lg px-1.5 py-1.5 outline-none shadow-[0_3px_10px_rgba(219,216,231,0.5)] cursor-pointer transition-all active:scale-95 mr-0.5"
                      style={{ borderColor: COLORS.cardBorder }}
                    >
                      <option value="Waitlist">Waitlist</option>
                      <option value="Sketch">Sketch</option>
                      <option value="Base color">Base color</option>
                      <option value="Rendering">Rendering</option>
                      <option value="Reviewing">Reviewing</option>
                      <option value="Revising">Revising</option>
                      <option value="Complete">Complete</option>
                    </select>

                    <button onClick={(e) => { e.stopPropagation(); onToggleDoing(e, task.id); }} className={`relative w-[26px] h-[26px] rounded-[8px] flex items-center justify-center transition-all active:scale-90 shadow-[0_3px_10px_rgba(219,216,231,1)]`} style={{ color: task.status === 'doing' ? COLORS.orangeDeep : '#978489', backgroundColor: task.status === 'doing' ? '#FAF1DB' : COLORS.buttonBg, borderWidth: '2px', borderColor: `${COLORS.cardBorder}cc` }}>
                      <div className={`${task.status === 'doing' ? 'animate-spin-slow' : ''} flex items-center justify-center`}>
                        <IconLoader size={13} />
                      </div>
                    </button>
                    <button onClick={(e) => { e.stopPropagation(); onToggleStatus(e, task.id); }} className={`relative w-[26px] h-[26px] rounded-[8px] flex items-center justify-center transition-all active:scale-90 shadow-[0_3px_10px_rgba(219,216,231,1)]`} style={{ color: task.status === 'done' ? COLORS.pinkDeep : '#978489', backgroundColor: task.status === 'done' ? '#FAF1DB' : COLORS.buttonBg, borderWidth: '2px', borderColor: `${COLORS.cardBorder}cc` }}>
                      <IconCheck size={14} />
                    </button>
                  </div>
                ) : (
                  <div className="flex items-center flex-shrink-0">
                    {task.status === 'doing' && <span className="text-[9px] font-bold text-[#978489] flex items-center gap-1 px-1.5 py-1 rounded-md border shadow-sm whitespace-nowrap" style={{ backgroundColor: '#FAF1DB', borderColor: COLORS.cardBorder }}><IconLoader size={10} className="animate-spin-slow"/> กำลังทำ</span>}
                    {task.status === 'done' && <span className="text-[9px] font-bold text-[#978489] flex items-center gap-1 px-1.5 py-1 rounded-md border shadow-sm whitespace-nowrap" style={{ backgroundColor: COLORS.buttonBg, borderColor: COLORS.cardBorder }}><IconCheck size={10} /> เสร็จแล้ว</span>}
                    {task.status === 'todo' && <span className="text-[9px] font-bold text-[#978489]/60 flex items-center gap-1 px-1.5 py-1 rounded-md border shadow-sm whitespace-nowrap" style={{ backgroundColor: COLORS.buttonBg, borderColor: COLORS.cardBorder }}><IconClock size={10} /> รอคิว</span>}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* ✨ เอฟเฟ็คเรืองแสงสีขาวและมีประกายระยิบระยับ (SVG วาดเอง) หากมี Tip */}
          <div className={`w-[64px] flex-shrink-0 flex flex-col items-center justify-center relative transition-transform ${hasTip ? 'animate-bounce-slow' : ''}`}>
             {hasTip && (
               <>
                 {/* แสงสีขาวกระจายอยู่ด้านหลัง */}
                 <div className="absolute inset-0 rounded-full blur-[10px] opacity-80 animate-pulse pointer-events-none bg-white z-0" style={{ transform: 'scale(1.25)' }}></div>
                 
                 {/* ประกายวิ้งๆ (Sparkles) วาดเองด้วย SVG */}
                 <div className="absolute -top-2 -right-2 w-4 h-4 drop-shadow-md animate-twinkle pointer-events-none z-20">
                   <svg viewBox="0 0 24 24" fill="white"><path d="M12 0l2.5 8.5L24 12l-9.5 3.5L12 24l-2.5-8.5L0 12l9.5-3.5z"/></svg>
                 </div>
                 <div className="absolute top-8 -left-3 w-3 h-3 drop-shadow-md animate-twinkle-delay pointer-events-none z-20">
                   <svg viewBox="0 0 24 24" fill="white"><path d="M12 0l2.5 8.5L24 12l-9.5 3.5L12 24l-2.5-8.5L0 12l9.5-3.5z"/></svg>
                 </div>
                 <div className="absolute -bottom-2 right-4 w-2 h-2 drop-shadow-md animate-twinkle pointer-events-none z-20" style={{ animationDelay: '0.5s' }}>
                   <svg viewBox="0 0 24 24" fill="white"><path d="M12 0l2.5 8.5L24 12l-9.5 3.5L12 24l-2.5-8.5L0 12l9.5-3.5z"/></svg>
                 </div>
               </>
             )}
             
             <div className="relative w-[64px] h-[64px] flex items-center justify-center z-10">
               <svg className="absolute inset-0 w-full h-full transform -rotate-90 overflow-visible" viewBox="0 0 100 100">
                   <circle cx="50" cy="50" r="49" fill={COLORS.orange} />
                   <circle cx="50" cy="50" r="45" stroke={circleColor} strokeWidth="1.5" fill="none" opacity="0.6" />
                   <circle cx="50" cy="50" r={radius} stroke={COLORS.dividerColor} strokeWidth="5" fill="none" opacity="0.15" />
                   <circle cx="50" cy="50" r={radius} stroke={circleColor} strokeWidth="5" fill="none" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className="transition-all duration-500" />
               </svg>
               <div className="relative z-10 flex flex-col items-center justify-center leading-none pointer-events-none mt-0.5">
                   <span className="text-[8px] font-black uppercase text-center leading-tight" style={{ color: circleColor }}>
                     {usageType === 'comm use' ? 'COMM' : 'NON'}<br/>{usageType === 'comm use' ? 'USE' : 'COMM'}
                   </span>
               </div>
             </div>
             <div className="mt-1.5 px-3 py-0.5 rounded-full shadow-sm flex items-center justify-center relative z-10" style={{ backgroundColor: circleColor }}>
                <span className="text-[9px] font-black tracking-widest text-white leading-none pt-[1px]">{percent}%</span>
             </div>
          </div>

        </div>
      );
    });

    // ==========================================
    // 📅 COMPONENT: CalendarView
    // ==========================================
    const CalendarView = React.memo(({ currentMonth, setCurrentMonth, selectedDate, setSelectedDate, today, tasks }) => {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay(); 

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null); 
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

      return (
        <div className="backdrop-blur-xl rounded-[32px] p-5 shadow-[0_12px_30px_rgba(219,216,231,0.5)] mb-5 animate-fadeIn" style={{ backgroundColor: `${COLORS.calendarBg}e6`, borderWidth: '4px', borderColor: COLORS.cardBorder }}>
          <div className="flex justify-between items-center mb-4 px-2">
            <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} className="p-1.5 rounded-full transition-colors text-[#978489]/70" style={{ backgroundColor: 'transparent' }} onMouseOver={(e) => e.currentTarget.style.backgroundColor=COLORS.buttonBg} onMouseOut={(e) => e.currentTarget.style.backgroundColor='transparent'}><IconChevronLeft size={20}/></button>
            <h3 className="font-black text-[16px] text-[#978489] tracking-widest whitespace-nowrap">{monthNames[month]} {year}</h3>
            <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} className="p-1.5 rounded-full transition-colors text-[#978489]/70" style={{ backgroundColor: 'transparent' }} onMouseOver={(e) => e.currentTarget.style.backgroundColor=COLORS.buttonBg} onMouseOut={(e) => e.currentTarget.style.backgroundColor='transparent'}><IconChevronRight size={20}/></button>
          </div>
          
          <div className="grid grid-cols-7 gap-1 text-center mb-3">
            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
              <div key={d} className="text-[9px] font-black text-[#978489] opacity-60 uppercase">{d}</div>
            ))}
          </div>
          
          <div className="grid grid-cols-7 gap-y-3 gap-x-1 text-center">
            {days.map((day, index) => {
              if (!day) return <div key={`empty-${index}`} className="h-10"></div>;
              
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const isSelected = selectedDate === dateStr;
              const isToday = today === dateStr;
              const hasTasks = tasks.some(t => t.deadline === dateStr); 

              return (
                <div key={dateStr} className="flex justify-center items-center h-10">
                  <div 
                    onClick={() => setSelectedDate(dateStr)} 
                    className={`relative w-10 h-10 flex flex-col items-center justify-center cursor-pointer transition-all ${
                      isSelected 
                        ? 'text-[#FAF1DB] rounded-full font-black shadow-md scale-105'
                        : isToday 
                          ? 'text-[#978489] font-black rounded-full'
                          : 'text-[#978489]/70 font-bold rounded-full hover:shadow-sm'
                    }`}
                    style={{
                      backgroundColor: isSelected ? COLORS.pinkDeep : (isToday ? COLORS.buttonBg : 'transparent'),
                      borderWidth: isToday && !isSelected ? '2px' : '0px',
                      borderColor: COLORS.cardBorder
                    }}
                    onMouseOver={(e) => { if(!isSelected && !isToday) e.currentTarget.style.backgroundColor = COLORS.cardWhite; }}
                    onMouseOut={(e) => { if(!isSelected && !isToday) e.currentTarget.style.backgroundColor = 'transparent'; }}
                  >
                    <span className="text-[13px] z-10 leading-none">{day}</span>
                    {hasTasks && (
                      <div className="absolute bottom-1 w-1.5 h-1.5 rounded-full" style={{ backgroundColor: isSelected ? COLORS.white : COLORS.pinkDeep }}></div> 
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    });

    // ==========================================
    // 🏠 MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [tasks, setTasks] = useState([]);
      const [taskTypes, setTaskTypes] = useState(['Logo', 'Banner', 'Artwork']); 
      const [channels, setChannels] = useState(['LINE', 'FB', 'IG']); 
      
      const [isLoading, setIsLoading] = useState(true);
      const [isSaving, setIsSaving] = useState(false); 
      
      const [view, setView] = useState('dashboard'); // dashboard | all | revenue
      const [isCalendarView, setIsCalendarView] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      });
      
      // State สำหรับหน้ารายรับ (Revenue View)
      const [revenueMonth, setRevenueMonth] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });
      const [revenueFilter, setRevenueFilter] = useState('grand'); // 'grand', 'sub', 'tip'
      const [isTipEnabled, setIsTipEnabled] = useState(false);

      const [showModal, setShowModal] = useState(false);     
      const [editingTask, setEditingTask] = useState(null);  
      const [taskToDelete, setTaskToDelete] = useState(null);
      const [showAuthModal, setShowAuthModal] = useState(false);   
      const [showImageModal, setShowImageModal] = useState(false); 
      const [showBannerModal, setShowBannerModal] = useState(false); 
      
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');
      
      const [isAdmin, setIsAdmin] = useState(false);
      const [password, setPassword] = useState('');
      const [authError, setAuthError] = useState(false);
      const [isVerifyingAuth, setIsVerifyingAuth] = useState(false);
      
      const [profileImage, setProfileImage] = useState(null);
      const [tempImageUrl, setTempImageUrl] = useState('');   
      const [bannerImage, setBannerImage] = useState(null);   
      const [tempBannerUrl, setTempBannerUrl] = useState(''); 
      const [isBannerVisible, setIsBannerVisible] = useState(true);
      
      const [selectedNextDate, setSelectedNextDate] = useState(''); 
      const [isBouncing, setIsBouncing] = useState(false); 

      // ⚠️ เปลี่ยน URL ตรงนี้เป็น API URL ของคุณที่ Deploy ใหม่ (ถ้ามี)
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhk8iMkn4e_vIZSgAe2zY2psPzRxxQf2OQ_MxxjyV_nbMizu3xq9lhtncE23ZEp4F5dg/exec";

      const fetchAPI = async (payload) => {
        try {
          const res = await fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          return await res.json();
        } catch (error) {
          console.error("API Error:", error);
          throw error;
        }
      };

      useEffect(() => {
        document.title = "YubiiCMS"; 
        fetch(WEB_APP_URL + "?action=getInitialData")
          .then(res => res.json())
          .then(response => {
            if (response.status === 'success') {
              setTasks(response.data.tasks || []);
              if (response.data.taskTypes && response.data.taskTypes.length > 0) setTaskTypes(response.data.taskTypes);
              if (response.data.channels && response.data.channels.length > 0) setChannels(response.data.channels);
              if (response.data.profileImage) setProfileImage(response.data.profileImage);
              if (response.data.bannerImage) setBannerImage(response.data.bannerImage);
              if (response.data.bannerVisible !== undefined) setIsBannerVisible(response.data.bannerVisible);
              if (response.data.lockedNextDate) setSelectedNextDate(response.data.lockedNextDate);
            }
            setIsLoading(false);
          })
          .catch(error => {
            console.error("Error loading data:", error);
            setIsLoading(false);
          });
      }, []);

      const handleAdminLogin = (e) => {
        e.preventDefault();
        setIsVerifyingAuth(true);
        setAuthError(false);
        fetchAPI({ action: 'verifyAdminPassword', inputPassword: password })
          .then(res => {
            setIsVerifyingAuth(false);
            if (res.isValid) {
              setIsAdmin(true); setShowAuthModal(false); setPassword(''); setAuthError(false);
            } else setAuthError(true);
          })
          .catch(() => { setIsVerifyingAuth(false); setAuthError(true); });
      };

      const handleSetManualDate = useCallback((dateVal) => {
        setSelectedNextDate(dateVal);
        fetchAPI({ action: 'saveLockedNextDate', dateStr: dateVal }); 
      }, []);
      
      const today = useMemo(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }, []); 
      
      const todayTasks = useMemo(() => tasks.filter(t => t.deadline === today), [tasks, today]);
      const doneToday = useMemo(() => todayTasks.filter(t => t.status === 'done').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);

      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let checkDate = new Date();
        for (let i = 0; i < 365; i++) {
          const y = checkDate.getFullYear(); 
          const m = String(checkDate.getMonth() + 1).padStart(2, '0'); 
          const d = String(checkDate.getDate()).padStart(2, '0'); 
          const dateStr = `${y}-${m}-${d}`;
          const tasksOnDate = tasks.filter(t => t.deadline === dateStr);
          if (tasksOnDate.length === 0) return dateStr;
          checkDate.setDate(checkDate.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate]);

      const waitingCount = useMemo(() => tasks.filter(t => t.status !== 'done').length, [tasks]);

      // สร้างรายการเดือนทั้งหมดที่มีในระบบเพื่อใส่ใน Dropdown
      const availableMonths = useMemo(() => {
        const months = new Set();
        tasks.forEach(t => {
           if (t.deadline) months.add(t.deadline.substring(0, 7));
        });
        // ใส่เดือนปัจจุบันเข้าไปเสมอ
        const d = new Date();
        months.add(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
        // เรียงจากเดือนล่าสุดไปเก่าสุด
        return Array.from(months).sort().reverse();
      }, [tasks]);

      // คำนวณรายรับสำหรับหน้าที่เลือก
      const revenueTasks = useMemo(() => {
        if (revenueMonth === 'all') return tasks.filter(t => t.deadline); 
        return tasks.filter(t => t.deadline && t.deadline.startsWith(revenueMonth));
      }, [tasks, revenueMonth]);
      
      const calculateRevenue = useMemo(() => {
          let total = 0;
          revenueTasks.forEach(t => {
              // ✨ เปลี่ยนมาใช้ paidAmount ในการคำนวณยอดเงิน
              const sub = parseFloat(t.paidAmount) || 0;
              const tip = parseFloat(t.tipAmount) || 0;
              if(revenueFilter === 'grand') total += (sub + tip);
              if(revenueFilter === 'sub') total += sub;
              if(revenueFilter === 'tip') total += tip;
          });
          return total;
      }, [revenueTasks, revenueFilter]);

      const toggleStatus = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
          if (t.id === id) {
            const newStatus = t.status === 'done' ? 'todo' : 'done';
            fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: newStatus });
            return { ...t, status: newStatus };
          }
          return t;
        }));
      }, []);

      const toggleDoing = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
          if (t.id === id) {
            const newStatus = t.status === 'doing' ? 'todo' : 'doing';
            fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: newStatus });
            return { ...t, status: newStatus };
          }
          return t;
        }));
      }, []);

      const handleChangeWorkStatus = useCallback((e, task, newWorkStatus) => {
        e.stopPropagation();
        const updatedTask = { ...task, workStatus: newWorkStatus };
        setTasks(prev => prev.map(t => t.id === task.id ? updatedTask : t));
        fetchAPI({ action: 'saveOrUpdateTask', task: updatedTask });
      }, []);

      const handleEditTask = useCallback((task) => {
        setEditingTask(task);
        setIsTipEnabled(task.hasTip === true || task.hasTip === 'true' || !!task.tipAmount);
        setShowModal(true);
      }, []);

      const handleSaveTask = (e) => {
        e.preventDefault();
        setIsSaving(true);
        const formData = new FormData(e.target);
        
        // ผูกข้อมูลส่งไปให้หลังบ้าน
        const taskData = {
          id: editingTask ? editingTask.id : null,
          title: '', 
          client: formData.get('client'),
          type: formData.get('type'), 
          channel: formData.get('channel'),
          priority: formData.get('priority') ? 'urgent' : 'normal', 
          deadline: formData.get('deadline'),
          details: formData.get('details'),
          usageType: formData.get('usageType') || 'non comm',
          totalAmount: formData.get('totalAmount') || 0,
          paidAmount: formData.get('paidAmount') || 0,
          hasTip: isTipEnabled, // ส่งค่า Tip ไปที่ API
          tipAmount: isTipEnabled ? (parseFloat(formData.get('tipAmount')) || 0) : 0, // ส่งเงินทิปไปที่ API
          workStatus: formData.get('workStatus') || 'Waitlist',
          status: editingTask ? editingTask.status : 'todo'
        };

        fetchAPI({ action: 'saveOrUpdateTask', task: taskData })
          .then(res => {
             if (res.status === 'success') {
                setTasks(prev => editingTask ? prev.map(t => t.id === res.task.id ? res.task : t) : [...prev, res.task]);
             }
             setIsSaving(false); setShowModal(false); setEditingTask(null);
          })
          .catch(() => { setIsSaving(false); });
      };

      const executeDeleteTask = () => {
        if (!taskToDelete) return;
        setIsSaving(true);
        fetchAPI({ action: 'deleteTask', taskId: taskToDelete })
          .then(() => {
             setTasks(prev => prev.filter(t => t.id !== taskToDelete));
             setIsSaving(false); setShowModal(false); setEditingTask(null); setTaskToDelete(null);
          })
          .catch(() => { setIsSaving(false); });
      };

      const toggleBannerVisibility = (visible) => {
        setIsBannerVisible(visible);
        fetchAPI({ action: 'saveBannerVisibility', isVisible: visible });
      };

      const triggerFlowerBounce = useCallback(() => { setIsBouncing(true); setTimeout(() => setIsBouncing(false), 500); }, []);
      const handleImageUpload = useCallback(() => { setShowImageModal(true); }, []);

      const filteredAllTasks = useMemo(() => tasks.filter(t => {
        const matchSearch = t.type.toLowerCase().includes(searchQuery.toLowerCase()) || t.client.toLowerCase().includes(searchQuery.toLowerCase());
        const matchFilter = filterType === 'all' || (filterType === 'pending' && t.status !== 'done') || (filterType === 'done' && t.status === 'done');
        return matchSearch && matchFilter;
      }), [tasks, searchQuery, filterType]);

      const displayedTasks = isCalendarView 
        ? filteredAllTasks.filter(t => t.deadline === selectedDate) 
        : filteredAllTasks;

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden" style={{ backgroundColor: COLORS.bg }}>
             <DynamicBackground />
             <div className="flex flex-col items-center z-10 animate-breathe">
               <div className="flex items-center gap-1.5 px-6 py-2.5 backdrop-blur-sm rounded-full shadow-sm" style={{ backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                 <p className="text-[12px] font-black tracking-widest text-[#978489]">กำลังโหลดข้อมูล</p>
                 <div className="flex gap-1 pt-1 ml-1">
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce bg-[#978489]" style={{ animationDelay: '0s' }}></span>
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce bg-[#DDCADB]" style={{ animationDelay: '0.15s' }}></span>
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce bg-[#F2DCE9]" style={{ animationDelay: '0.3s' }}></span>
                 </div>
               </div>
             </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen font-sans relative" style={{ backgroundColor: COLORS.bg, color: COLORS.textMain }}>
          <DynamicBackground />
          <div className="max-w-md mx-auto min-h-screen relative pb-28">
            <Header isAdmin={isAdmin} setIsAdmin={setIsAdmin} setShowAuthModal={setShowAuthModal} handleImageUpload={handleImageUpload} profileImage={profileImage} view={view} setView={setView} />
            
            <div className="px-5 relative z-10 mb-4">
               {bannerImage && isBannerVisible && (
                 <div className="relative group w-full h-32 rounded-[24px] overflow-hidden shadow-sm backdrop-blur-sm" style={{ borderWidth: '3px', borderColor: COLORS.cardBorder, backgroundColor: `${COLORS.cardWhite}66` }}>
                    <img src={bannerImage} alt="Shop Banner" className="w-full h-full object-cover" />
                    <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                       {isAdmin && (
                         <button onClick={() => setShowBannerModal(true)} className="p-1.5 backdrop-blur-md rounded-full shadow-sm text-[#978489]/80 hover:text-[#978489] transition-colors" style={{ backgroundColor: `${COLORS.bannerOverlayBg}e6` }} title="เปลี่ยนแบนเนอร์">
                            <IconImage size={16} />
                         </button>
                       )}
                       {isAdmin && (
                         <button onClick={() => toggleBannerVisibility(false)} className="p-1.5 backdrop-blur-md rounded-full shadow-sm text-[#978489]/80 hover:text-[#978489] transition-colors" style={{ backgroundColor: `${COLORS.bannerOverlayBg}e6` }} title="ซ่อนแบนเนอร์">
                            <IconEyeOff size={16} />
                         </button>
                       )}
                    </div>
                 </div>
               )}

               {bannerImage && !isBannerVisible && isAdmin && (
                 <div className="flex justify-end mb-1">
                    <button onClick={() => toggleBannerVisibility(true)} className="text-[10px] font-bold flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-sm hover:opacity-80 transition-colors whitespace-nowrap" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                       <IconEye size={12} /> แสดงแบนเนอร์
                    </button>
                 </div>
               )}

               {!bannerImage && isAdmin && (
                 <div onClick={() => setShowBannerModal(true)} className="w-full h-16 rounded-[24px] border-[3px] border-dashed backdrop-blur-sm flex items-center justify-center cursor-pointer hover:opacity-80 transition-colors" style={{ borderColor: COLORS.cardBorder, backgroundColor: `${COLORS.cardWhite}66` }}>
                    <span className="text-[11px] font-bold flex items-center gap-2 whitespace-nowrap" style={{ color: COLORS.textSoft }}><IconPlus size={16}/> เพิ่มรูปแบนเนอร์ร้าน</span>
                 </div>
               )}
            </div>
            
            <div className="px-5 relative z-10">
              {view === 'dashboard' ? (
                <div className="animate-fadeIn">
                  <div className="flex gap-3 h-28 mb-4">
                    <div className="flex-[1.6]">
                      <CompactStats isAdmin={isAdmin} selectedNextDate={selectedNextDate} nextQueueDate={nextQueueDate} handleSetManualDate={handleSetManualDate} waitingCount={waitingCount} />
                    </div>
                    <div className="flex-1">
                      <ProgressFlower progress={progress} todayTasksLength={todayTasks.length} doneToday={doneToday} triggerFlowerBounce={triggerFlowerBounce} isBouncing={isBouncing} />
                    </div>
                  </div>
                  <div className="flex items-center justify-between mb-2.5 ml-1">
                    <h2 className="text-[10px] font-black text-[#978489]/60 italic uppercase tracking-[0.3em] whitespace-nowrap">Today's Task</h2>
                    <div className="h-[1px] flex-1 bg-gradient-to-r from-[#DDCADB]/40 to-transparent mx-3"></div>
                  </div>
                  <div className="space-y-1">
                    {todayTasks.length > 0 ? todayTasks.map(t => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={handleEditTask} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} onChangeWorkStatus={handleChangeWorkStatus} />) : (
                      <div className="text-center py-10 rounded-[28px] border-2 border-dashed" style={{ backgroundColor: `${COLORS.cardWhite}4d`, borderColor: COLORS.cardBorder }}>
                        <p className="text-[9px] font-bold uppercase tracking-widest opacity-60 text-[#978489]">Sky is clear ✨</p>
                      </div>
                    )}
                  </div>
                </div>
              ) : view === 'all' ? (
                <div className="animate-fadeIn">
                  <div className="relative mb-4">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-50" style={{ color: COLORS.blueDeep }}><IconSearch size={16} /></div>
                    <input type="text" placeholder="ค้นหาคิวงาน..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full rounded-[22px] py-3 pl-10 pr-4 outline-none text-xs shadow-lg shadow-[#978489]/10 transition-all backdrop-blur-sm text-[#978489]" style={{ backgroundColor: `${COLORS.searchInputBg}cc`, borderWidth: '2px', borderColor: COLORS.blue }} />
                  </div>
                  
                  <div className="flex gap-2 mb-3 p-1.5 rounded-full backdrop-blur-md shadow-sm" style={{ backgroundColor: `${COLORS.filterBarBg}80`, borderWidth: '3px', borderColor: COLORS.cardBorder }}>
                      <button onClick={() => setFilterType('all')} className={`flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider whitespace-nowrap ${filterType === 'all' ? 'shadow-sm' : 'text-[#978489]/60 hover:opacity-80'}`} style={{ color: filterType === 'all' ? COLORS.pinkDeep : '', backgroundColor: filterType === 'all' ? COLORS.buttonBg : 'transparent' }}>ทั้งหมด</button>
                      <button onClick={() => setFilterType('pending')} className={`flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider whitespace-nowrap ${filterType === 'pending' ? 'shadow-sm' : 'text-[#978489]/60 hover:opacity-80'}`} style={{ color: filterType === 'pending' ? COLORS.orangeDeep : '', backgroundColor: filterType === 'pending' ? COLORS.buttonBg : 'transparent' }}>ยังไม่ได้เริ่ม</button>
                      <button onClick={() => setFilterType('done')} className={`flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider whitespace-nowrap ${filterType === 'done' ? 'shadow-sm' : 'text-[#978489]/60 hover:opacity-80'}`} style={{ color: filterType === 'done' ? COLORS.blueDeep : '', backgroundColor: filterType === 'done' ? COLORS.buttonBg : 'transparent' }}>เสร็จแล้ว</button>
                  </div>

                  <div className="flex justify-end mb-4 pr-1">
                    <button onClick={() => { 
                      const newView = !isCalendarView;
                      setIsCalendarView(newView); 
                      if(newView) setFilterType('all'); 
                    }} className="flex items-center gap-1.5 px-3 py-1.5 backdrop-blur-md rounded-full shadow-[0_4px_10px_rgba(219,216,231,0.5)] text-[9px] font-black uppercase tracking-widest hover:text-[#978489] transition-all active:scale-95 text-[#978489]/80 whitespace-nowrap" style={{ backgroundColor: `${COLORS.buttonBg}cc`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                      {isCalendarView ? <><IconList size={14} /> รูปแบบรายการ</> : <><IconCalendar size={14} /> รูปแบบปฏิทิน</>}
                    </button>
                  </div>

                  {isCalendarView && <CalendarView currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} selectedDate={selectedDate} setSelectedDate={setSelectedDate} today={today} tasks={tasks} />}

                  <div className="space-y-1">
                    {displayedTasks.length > 0 ? displayedTasks.map(t => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={handleEditTask} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} onChangeWorkStatus={handleChangeWorkStatus} />) : (
                      <div className="text-center py-10 rounded-[28px] border-[4px] border-dashed shadow-sm mt-4" style={{ backgroundColor: `${COLORS.cardWhite}4d`, borderColor: COLORS.cardBorder }}>
                        <p className="text-[10px] font-black uppercase tracking-widest opacity-60 text-[#978489] whitespace-nowrap">
                          {isCalendarView ? "วันนี้คิวว่าง ✨" : "No records found ✨"}
                        </p>
                      </div>
                    )}
                  </div>
                </div>
              ) : view === 'revenue' && isAdmin ? (
                <div className="animate-fadeIn">
                  {/* Revenue View */}
                  <div className="flex gap-2 mb-4 relative z-10">
                     {/* เปลี่ยนช่องเลือกเดือนเป็น Dropdown สำหรับดูแบบรวมทั้งหมด */}
                     <div className="flex-1 p-1.5 rounded-2xl shadow-sm flex items-center pr-2 backdrop-blur-md transition-colors hover:opacity-80 cursor-pointer" style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                        <IconCalendar size={16} className="text-[#978489] ml-2 mr-1 flex-shrink-0" />
                        <select value={revenueMonth} onChange={(e) => setRevenueMonth(e.target.value)} className="bg-transparent outline-none text-[11px] font-black text-[#978489] w-full cursor-pointer appearance-none px-1">
                           <option value="all">รวมทั้งหมด (All)</option>
                           {availableMonths.map(m => {
                              const [year, month] = m.split('-');
                              const date = new Date(year, month - 1);
                              return <option key={m} value={m}>{date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</option>;
                           })}
                        </select>
                        <IconChevronRight size={14} className="text-[#978489]/50 rotate-90 flex-shrink-0" />
                     </div>
                     <div className="flex-[1.2] p-1.5 rounded-2xl shadow-sm flex items-center pr-2 backdrop-blur-md" style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                        <select value={revenueFilter} onChange={(e) => setRevenueFilter(e.target.value)} className="bg-transparent outline-none text-xs font-black text-[#978489] w-full cursor-pointer appearance-none px-2">
                           <option value="grand">Grand Total</option>
                           <option value="sub">Sub Total</option>
                           <option value="tip">Tip</option>
                        </select>
                        <IconChevronRight size={14} className="text-[#978489]/50 rotate-90 flex-shrink-0" />
                     </div>
                  </div>

                  <div className="backdrop-blur-xl rounded-[32px] p-6 shadow-xl mb-5 relative overflow-hidden flex flex-col items-center justify-center transition-all" style={{ backgroundColor: `${COLORS.pink}e6`, borderWidth: '4px', borderColor: COLORS.cardBorder }}>
                     <div className="absolute -top-10 -right-10 w-32 h-32 rounded-full blur-2xl opacity-50" style={{ backgroundColor: COLORS.white }}></div>
                     <span className="text-[10px] font-black uppercase tracking-[0.2em] mb-1 z-10" style={{ color: `${COLORS.textMain}b3` }}>
                         {revenueFilter === 'grand' ? 'Total Revenue' : revenueFilter === 'sub' ? 'Sub Total Revenue' : 'Total Tips'}
                     </span>
                     <div className="flex items-baseline gap-1 z-10">
                         <span className="text-4xl font-black tracking-tighter" style={{ color: COLORS.textMain }}>{calculateRevenue.toLocaleString()}</span>
                         <span className="text-sm font-bold" style={{ color: `${COLORS.textMain}99` }}>THB</span>
                     </div>
                  </div>

                  <div className="flex items-center justify-between mb-2.5 ml-1">
                    <h2 className="text-[10px] font-black text-[#978489]/60 italic uppercase tracking-[0.3em] whitespace-nowrap">Transactions</h2>
                    <div className="h-[1px] flex-1 bg-gradient-to-r from-[#DDCADB]/40 to-transparent mx-3"></div>
                  </div>

                  <div className="space-y-2">
                      {revenueTasks.map(t => {
                          // ✨ เปลี่ยนมาใช้ paidAmount สำหรับการคำนวณแต่ละรายการ
                          const sub = parseFloat(t.paidAmount) || 0;
                          const tip = parseFloat(t.tipAmount) || 0;
                          let amount = 0;
                          if(revenueFilter === 'grand') amount = sub + tip;
                          if(revenueFilter === 'sub') amount = sub;
                          if(revenueFilter === 'tip') amount = tip;

                          if(revenueFilter === 'tip' && tip === 0) return null;

                          return (
                              <div key={t.id} className="flex justify-between items-center px-4 py-3 rounded-[22px] backdrop-blur-sm shadow-sm transition-all" style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                                  <div className="flex items-center gap-3">
                                      <div className="w-8 h-8 rounded-full flex items-center justify-center font-black text-[10px] shadow-sm" style={{ backgroundColor: COLORS.buttonBg, color: COLORS.purpleDeep, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                                          {t.client.charAt(0).toUpperCase()}
                                      </div>
                                      <div className="flex flex-col">
                                          <span className="text-xs font-bold text-[#978489] leading-tight">{t.client}</span>
                                          <span className="text-[9px] font-bold text-[#978489]/60 mt-0.5">{t.type}</span>
                                      </div>
                                  </div>
                                  <span className="text-sm font-black whitespace-nowrap" style={{ color: COLORS.pinkDeep }}>+{amount.toLocaleString()} ฿</span>
                              </div>
                          );
                      })}
                      {revenueTasks.length === 0 || (revenueFilter === 'tip' && calculateRevenue === 0) ? (
                           <div className="text-center py-10 rounded-[28px] border-[4px] border-dashed shadow-sm mt-4" style={{ backgroundColor: `${COLORS.cardWhite}4d`, borderColor: COLORS.cardBorder }}>
                              <p className="text-[10px] font-black uppercase tracking-widest opacity-60 text-[#978489] whitespace-nowrap">
                                {revenueMonth === 'all' ? 'ไม่มีรายการ ✨' : 'ไม่มีรายการในเดือนนี้ ✨'}
                              </p>
                            </div>
                      ) : null}
                  </div>
                </div>
              ) : null}
            </div>

            {/* Navigation Bar */}
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 ${isAdmin ? 'w-full max-w-[280px]' : 'w-auto'}`}>
              <div className={`rounded-[36px] h-[72px] shadow-[0_12px_40px_rgba(151,132,137,0.35)] flex relative items-center ${isAdmin ? 'w-full' : 'px-8 gap-10 justify-center'}`} style={{ backgroundColor: COLORS.navBarBg, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  
                  {/* Home (Left) */}
                  <div className={`${isAdmin ? 'flex-1' : ''} flex items-center justify-center`}>
                    <button onClick={() => setView('dashboard')} className={`p-2 transition-all z-10 ${view === 'dashboard' ? 'scale-110 drop-shadow-md' : 'opacity-40 hover:opacity-80'}`} style={{ color: view === 'dashboard' ? COLORS.pinkDeep : COLORS.textMain }}>
                      <IconHome size={26} />
                    </button>
                  </div>

                  {/* File (Center) */}
                  <div className={`${isAdmin ? 'flex-1' : ''} flex items-center justify-center`}>
                    <button onClick={() => setView('all')} className={`p-2 transition-all z-10 ${view === 'all' ? 'scale-110 drop-shadow-md' : 'opacity-40 hover:opacity-80'}`} style={{ color: view === 'all' ? COLORS.blueDeep : COLORS.textMain }}>
                      <IconFileText size={26} />
                    </button>
                  </div>

                  {/* Wallet (Right) - 🔒 โชว์เฉพาะ Admin เท่านั้น */}
                  {isAdmin && (
                    <div className="flex-1 flex items-center justify-center">
                      <button onClick={() => setView('revenue')} className={`p-2 transition-all z-10 ${view === 'revenue' ? 'scale-110 drop-shadow-md' : 'opacity-40 hover:opacity-80'}`} style={{ color: view === 'revenue' ? COLORS.orangeDeep : COLORS.textMain }}>
                        <IconWallet size={26} />
                      </button>
                    </div>
                  )}

                  {/* Floating Action Button (Admin Plus) */}
                  {isAdmin && (
                    <div className="absolute left-1/2 -translate-x-1/2 -top-[56px] z-20">
                      <button onClick={() => { setEditingTask(null); setIsTipEnabled(false); setShowModal(true); }} className="w-[50px] h-[50px] rounded-full flex items-center justify-center shadow-[0_6px_20px_rgba(151,132,137,0.4)] active:scale-95 transition-transform box-content" style={{ background: `linear-gradient(to bottom right, ${COLORS.textMain}, ${COLORS.purple})`, borderWidth: '6px', borderColor: COLORS.navBarBg, color: COLORS.white }}>
                        <IconPlus size={30} strokeWidth="2.5" />
                      </button>
                    </div>
                  )}
              </div>
            </div>

            {/* Task Edit / Add Modal */}
            {showModal && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#978489]/20 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={handleSaveTask} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp relative" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   
                   <h3 className="text-sm font-black mb-4 text-center text-[#978489]">{editingTask ? 'แก้ไขคิวงาน ✨' : 'เพิ่มคิวใหม่ ✨'}</h3>
                   
                   <div className="space-y-2 relative max-h-[75vh] overflow-y-auto hide-scroll pb-2 px-1 -mx-1">
                     {isSaving && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center rounded-2xl backdrop-blur-sm" style={{ backgroundColor: `${COLORS.modalBg}cc` }}>
                           <IconLoader size={32} className="animate-spin-slow" style={{ color: COLORS.pinkDeep }} />
                           <span className="text-[10px] font-black mt-2 text-[#978489]/80">กำลังบันทึก...</span>
                        </div>
                     )}
                     
                     <div className="flex justify-end mb-1">
                       <label className="flex items-center cursor-pointer gap-2 px-3 py-1.5 rounded-full shadow-sm border border-[#DBD8E7]/50" style={{ backgroundColor: COLORS.buttonBg }}>
                         <span className="text-[10px] font-bold text-[#978489]/80 whitespace-nowrap">คิวด่วน 🔥</span>
                         <div className="relative">
                           <input type="checkbox" name="priority" value="urgent" defaultChecked={editingTask?.priority === 'urgent'} className="sr-only peer" />
                           <div className={`w-8 h-4 bg-[#DBD8E7] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-[#FAF1DB] after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-[#FAF1DB] after:border-[#978489]/30 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[${COLORS.pinkDeep}]`}></div>
                         </div>
                       </label>
                     </div>

                     <input name="client" required defaultValue={editingTask?.client || ''} className="w-full p-3.5 rounded-2xl border border-[#DBD8E7]/50 outline-none text-[11px] shadow-sm focus:border-[#FAF1DB] transition-all text-[#978489]" style={{ backgroundColor: COLORS.cardInner }} placeholder="ชื่อลูกค้า" />
                     
                     <div className="flex flex-col gap-2">
                        <input list="taskTypesList" name="type" required defaultValue={editingTask?.type || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none border border-[#DBD8E7]/50 shadow-sm text-[#978489]" style={{ backgroundColor: COLORS.cardInner }} placeholder="ประเภทงาน" />
                        <datalist id="taskTypesList">
                          {taskTypes.map(type => <option key={type} value={type} />)}
                        </datalist>

                        <input list="channelsList" name="channel" required defaultValue={editingTask?.channel || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none border border-[#DBD8E7]/50 shadow-sm text-[#978489]" style={{ backgroundColor: COLORS.cardInner }} placeholder="ช่องทาง" />
                        <datalist id="channelsList">
                          {channels.map(ch => <option key={ch} value={ch} />)}
                        </datalist>
                     </div>

                     <select name="workStatus" required defaultValue={editingTask?.workStatus || 'Waitlist'} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none border border-[#DBD8E7]/50 shadow-sm text-[#978489] mt-2 cursor-pointer transition-all focus:border-[#FAF1DB]" style={{ backgroundColor: COLORS.cardInner }}>
                        <option value="Waitlist">Waitlist</option>
                        <option value="Sketch">Sketch</option>
                        <option value="Base color">Base color</option>
                        <option value="Rendering">Rendering</option>
                        <option value="Reviewing">Reviewing</option>
                        <option value="Revising">Revising</option>
                        <option value="Complete">Complete</option>
                     </select>

                     <textarea name="details" rows="2" defaultValue={editingTask?.details || ''} className="w-full p-3.5 rounded-2xl border border-[#DBD8E7]/50 outline-none text-[11px] shadow-sm focus:border-[#FAF1DB] transition-all resize-none text-[#978489]" style={{ backgroundColor: COLORS.cardInner }} placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)..."></textarea>
                     
                     <div className="flex gap-2 mt-3 pt-3 border-t border-[#DDCADB]/40">
                        <label className="flex-1 cursor-pointer relative">
                           <input type="radio" name="usageType" value="non comm" defaultChecked={editingTask?.usageType !== 'comm use'} className="peer sr-only" />
                           <div className="text-center py-2.5 rounded-xl border-[2px] text-[10px] font-black tracking-wider transition-all peer-checked:bg-[#FAF1DB] peer-checked:text-[#978489] peer-checked:border-[#978489] border-[#DBD8E7]/50 text-[#978489]/50 whitespace-nowrap" style={{ backgroundColor: COLORS.cardInner }}>NON COMM</div>
                        </label>
                        <label className="flex-1 cursor-pointer relative">
                           <input type="radio" name="usageType" value="comm use" defaultChecked={editingTask?.usageType === 'comm use'} className="peer sr-only" />
                           <div className="text-center py-2.5 rounded-xl border-[2px] text-[10px] font-black tracking-wider transition-all peer-checked:bg-[#FAF1DB] peer-checked:text-[#978489] peer-checked:border-[#978489] border-[#DBD8E7]/50 text-[#978489]/50 whitespace-nowrap" style={{ backgroundColor: COLORS.cardInner }}>COMM USE</div>
                        </label>
                     </div>

                     {/* Tip Toggle */}
                     <div className="flex items-center justify-between mt-3 mb-1 px-1">
                         <span className="text-[11px] font-bold text-[#978489]">เพิ่มเงินทิป (Tip)</span>
                         <label className="relative inline-flex items-center cursor-pointer">
                             <input type="checkbox" name="hasTip" checked={isTipEnabled} onChange={(e) => setIsTipEnabled(e.target.checked)} className="sr-only peer" />
                             <div className="w-8 h-4 bg-[#DBD8E7] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-[#FAF1DB] after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-[#FAF1DB] after:border-[#978489]/30 after:border after:rounded-full after:h-3 after:w-3 after:transition-all" style={{ backgroundColor: isTipEnabled ? COLORS.pinkDeep : '' }}></div>
                         </label>
                     </div>

                     <div className="flex gap-2 mt-1">
                        <input type="number" name="totalAmount" defaultValue={editingTask?.totalAmount || ''} className="w-full p-3.5 rounded-2xl border border-[#DBD8E7]/50 outline-none text-[11px] shadow-sm focus:border-[#FAF1DB] transition-all text-[#978489]" style={{ backgroundColor: COLORS.cardInner }} placeholder="ราคาเต็ม" />
                        {isTipEnabled && (
                            <input type="number" name="tipAmount" defaultValue={editingTask?.tipAmount || ''} className="w-full p-3.5 rounded-2xl border border-[#DBD8E7]/50 outline-none text-[11px] shadow-sm focus:border-[#FAF1DB] transition-all text-[#978489] animate-fadeIn" style={{ backgroundColor: COLORS.cardInner }} placeholder="ยอดทิป" />
                        )}
                        <input type="number" name="paidAmount" defaultValue={editingTask?.paidAmount || ''} className="w-full p-3.5 rounded-2xl border border-[#DBD8E7]/50 outline-none text-[11px] shadow-sm focus:border-[#FAF1DB] transition-all text-[#978489]" style={{ backgroundColor: COLORS.cardInner }} placeholder="จ่ายแล้ว" />
                     </div>

                     <div className="flex items-center justify-between p-1.5 pl-4 rounded-2xl border transition-all hover:opacity-80 hover:shadow-sm group mt-3" style={{ backgroundColor: `${COLORS.buttonBg}4d`, borderColor: COLORS.cardBorder }}>
