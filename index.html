                       <div className="flex items-center gap-1.5 text-[10px] uppercase tracking-wider font-black whitespace-nowrap" style={{ color: COLORS.pinkDeep }}>
                         <IconCalendar size={12} className="group-hover:animate-bounce-slow transition-transform" /><span>Deadline</span>
                       </div>
                       <input name="deadline" type="date" required defaultValue={editingTask?.deadline || nextQueueDate} className="w-32 p-2.5 rounded-xl border outline-none text-[10px] font-black text-[#978489] shadow-sm focus:border-[#978489] focus:ring-2 focus:ring-[#978489]/50 transition-all cursor-pointer active:scale-95 hover:border-[#978489]" style={{ backgroundColor: COLORS.cardInner, borderColor: COLORS.cardBorder }} />
                     </div>
                     
                     <div className="flex items-center gap-2 mt-4 pt-2">
                       <button type="submit" className="flex-1 py-3.5 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all disabled:opacity-50 whitespace-nowrap" style={{ backgroundColor: COLORS.textMain, color: COLORS.white }}>บันทึกคิวงาน</button>
                       {editingTask && (
                         <button type="button" onClick={() => setTaskToDelete(editingTask.id)} className="w-12 h-[44px] flex items-center justify-center rounded-2xl active:scale-95 transition-all shadow-sm" style={{ backgroundColor: `${COLORS.pink}80`, color: COLORS.textMain, borderWidth: '1px', borderColor: COLORS.pink }} title="ลบคิวงาน">
                           <IconTrash size={18} />
                         </button>
                       )}
                     </div>
                     <button type="button" onClick={() => { setShowModal(false); setEditingTask(null); }} className="w-full text-[9px] font-bold text-[#978489]/50 mt-2 uppercase tracking-widest whitespace-nowrap pb-1">Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* Auth Modal */}
            {showAuthModal && (
              <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-[#978489]/20 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={handleAdminLogin} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   <h3 className="text-sm font-black mb-4 text-center text-[#978489]">เข้าสู่ระบบ Admin</h3>
                   <div className="space-y-2">
                     <input type="password" required value={password} onChange={(e) => { setPassword(e.target.value); setAuthError(false); }} className={`w-full p-3.5 rounded-2xl border outline-none text-[11px] shadow-sm transition-all text-center tracking-widest text-[#978489] ${authError ? 'border-[#978489] focus:border-[#978489]' : 'border-[#DBD8E7]/50 focus:border-[#FAF1DB]'}`} style={{ backgroundColor: COLORS.cardInner }} placeholder="ใส่รหัสผ่าน" disabled={isVerifyingAuth} />
                     {authError && <p className="text-[#978489] text-[9px] text-center font-bold">รหัสผ่านไม่ถูกต้อง!</p>}
                     <button type="submit" disabled={isVerifyingAuth} className="w-full h-11 rounded-2xl font-black text-xs mt-3 shadow-lg flex items-center justify-center active:scale-95 transition-all disabled:opacity-70" style={{ backgroundColor: COLORS.pinkDeep, color: COLORS.white }}>
                        {isVerifyingAuth ? <IconLoader size={16} className="animate-spin-slow" /> : 'Login'}
                     </button>
                     <button type="button" onClick={() => { setShowAuthModal(false); setAuthError(false); setPassword(''); }} className="w-full text-[9px] font-bold text-[#978489]/50 mt-1 uppercase tracking-widest whitespace-nowrap" disabled={isVerifyingAuth}>Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* Image Modal */}
            {showImageModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-[#978489]/20 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={(e) => { 
                    e.preventDefault(); 
                    if (tempImageUrl) { 
                        let finalUrl = tempImageUrl;
                        const match = finalUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || finalUrl.match(/id=([a-zA-Z0-9_-]+)/) || finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match && match[1]) {
                            finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                        }
                        setProfileImage(finalUrl); 
                        fetchAPI({ action: 'saveProfileImage', imageUrl: finalUrl });
                    } 
                    setShowImageModal(false); 
                    setTempImageUrl(''); 
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   <h3 className="text-sm font-black mb-4 text-center text-[#978489]">เปลี่ยนรูปโปรไฟล์ 🐰</h3>
                   <div className="space-y-2">
                     <input type="url" required value={tempImageUrl} onChange={(e) => setTempImageUrl(e.target.value)} className="w-full p-3.5 rounded-2xl border border-[#DBD8E7]/50 outline-none text-[11px] shadow-sm focus:border-[#FAF1DB] transition-all text-center text-[#978489]" style={{ backgroundColor: COLORS.cardInner }} placeholder="วางลิงก์รูปภาพ Google Drive ที่นี่..." />
                     <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 shadow-lg active:scale-95 transition-all" style={{ backgroundColor: COLORS.pinkDeep, color: COLORS.white }}>Save Image</button>
                     <button type="button" onClick={() => { setShowImageModal(false); setTempImageUrl(''); }} className="w-full text-[9px] font-bold text-[#978489]/50 mt-1 uppercase tracking-widest whitespace-nowrap">Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* Banner Modal */}
            {showBannerModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-[#978489]/20 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={(e) => { 
                    e.preventDefault(); 
                    if (tempBannerUrl) { 
                        let finalUrl = tempBannerUrl;
                        const match = finalUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || finalUrl.match(/id=([a-zA-Z0-9_-]+)/) || finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match && match[1]) {
                            finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                        }
                        setBannerImage(finalUrl); 
                        toggleBannerVisibility(true);
                        fetchAPI({ action: 'saveBannerImage', imageUrl: finalUrl });
                    } 
                    setShowBannerModal(false); 
                    setTempBannerUrl(''); 
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   <h3 className="text-sm font-black mb-4 text-center text-[#978489]">เปลี่ยนแบนเนอร์</h3>
                   <div className="space-y-2">
                     <input type="url" required value={tempBannerUrl} onChange={(e) => setTempBannerUrl(e.target.value)} className="w-full p-3.5 rounded-2xl border border-[#DBD8E7]/50 outline-none text-[11px] shadow-sm focus:border-[#FAF1DB] transition-all text-center text-[#978489]" style={{ backgroundColor: COLORS.cardInner }} placeholder="วางลิงก์รูปภาพ Google Drive..." />
                     <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 shadow-lg active:scale-95 transition-all" style={{ backgroundColor: COLORS.orangeDeep, color: COLORS.white }}>Save Banner</button>
                     <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }} className="w-full text-[9px] font-bold text-[#978489]/50 mt-1 uppercase tracking-widest whitespace-nowrap">Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* Delete Modal */}
            {taskToDelete && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-[#978489]/30 backdrop-blur-[2px] animate-fadeIn">
                <div className="backdrop-blur-xl w-full max-w-[260px] rounded-[30px] p-6 shadow-2xl animate-slideUp text-center" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  <div className="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm border" style={{ backgroundColor: `${COLORS.pink}80`, color: COLORS.textMain, borderColor: COLORS.pink }}>
                     <IconTrash size={26} />
                  </div>
                  <h3 className="text-[14px] font-black mb-1 text-[#978489]">ยืนยันการลบ?</h3>
                  <p className="text-[10px] font-bold text-[#978489]/80 mb-5">คุณต้องการลบคิวงานนี้ใช่หรือไม่<br/>(ไม่สามารถกู้คืนได้)</p>
                  
                  <div className="flex gap-2">
                    <button onClick={() => setTaskToDelete(null)} className="flex-1 py-3 rounded-2xl font-black text-[10px] active:scale-95 transition-all shadow-sm hover:opacity-80" style={{ backgroundColor: `${COLORS.buttonBg}80`, color: COLORS.textMain }}>ยกเลิก</button>
                    <button onClick={executeDeleteTask} className="flex-1 py-3 rounded-2xl font-black text-[10px] active:scale-95 transition-all shadow-sm hover:opacity-90 whitespace-nowrap" style={{ backgroundColor: COLORS.textMain, color: COLORS.white }}>ลบข้อมูล</button>
                  </div>
                </div>
              </div>
            )}

          </div>
          
          <style>{`
            @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } }
            @keyframes float-reverse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-25px, 15px); } }
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes float-particle-1 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-20px); opacity: 0; } }
            @keyframes float-particle-2 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-15px) translateX(5px); opacity: 0; } }
            @keyframes float-particle-3 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-25px) translateX(-5px); opacity: 0; } }
            @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            
            @keyframes float-icon { 
              0%, 100% { transform: translateY(0) rotate(-8deg); } 
              50% { transform: translateY(-4px) rotate(-8deg); } 
            }
            
            @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            
            /* ✨ แอนิเมชั่นวิ้งๆ สำหรับดาวระยิบระยับ */
            @keyframes twinkle {
              0%, 100% { opacity: 0.1; transform: scale(0.6) rotate(0deg); }
              50% { opacity: 1; transform: scale(1.2) rotate(15deg); }
            }
            .animate-twinkle { animation: twinkle 2.5s ease-in-out infinite; }
            .animate-twinkle-delay { animation: twinkle 3s ease-in-out infinite 1.2s; }
            
            .animate-text-wave { animation: text-wave 4s ease-in-out infinite; }
            .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
            .animate-float-particle-1 { animation: float-particle-1 3s ease-out infinite; }
            .animate-float-particle-2 { animation: float-particle-2 4s ease-out infinite 1s; }
            .animate-float-particle-3 { animation: float-particle-3 3.5s ease-out infinite 0.5s; }
            .animate-float { animation: float 15s ease-in-out infinite; }
            .animate-float-reverse { animation: float-reverse 18s ease-in-out infinite; }
            .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
            
            .animate-float-icon { animation: float-icon 3s ease-in-out infinite; }
            
            .animate-slideUp { animation: slideUp 0.3s ease-out; }
            .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
            .animate-spin-slow { animation: spin-slow 4s linear infinite; }
            .hide-scroll::-webkit-scrollbar { display: none; }
            .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
